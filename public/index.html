<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Words+</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; line-height: 1.6; }
    .container { max-width: 500px; margin: 0 auto; }
    #lobby, #waiting, #game, #results { display: none; }
    #lobby { display: block; }
    h1 { font-size: 2.5rem; text-align: center; margin: 0 0 40px 0; }
    h2 { font-size: 1.3rem; margin-top: 20px; }
    input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; font-size: 1.2rem; background: #000; border: 2px solid #fff; color: #fff; font-family: 'Courier New', Courier, monospace; }
    input[type="text"]:focus { outline: none; border: 2px solid #FFD700; }
    button { width: 100%; padding: 15px; font-size: 1.2rem; background: #4CAF50; color: #000; border: none; cursor: pointer; font-weight: bold; font-family: 'Courier New', Courier, monospace; margin-bottom: 10px; }
    button:hover { background: #45a049; }
    #room-code-display { font-size: 3rem; text-align: center; color: #FFD700; margin: 40px 0; }
    #players-list { list-style: none; padding: 0; margin: 20px 0; font-size: 1.1rem; }
    #players-list li { padding: 10px 0; border-bottom: 1px solid #444; }
    #letter { font-size: 5rem; text-align: center; color: #FFD700; margin: 40px 0; }
    #timer { text-align: center; font-size: 2rem; margin-bottom: 30px; }
    #timer.danger { color: #f44336; }
    .category-group { margin-bottom: 20px; }
    .category-label { font-size: 1rem; margin-bottom: 5px; display: block; }
    .category-input { width: 100%; padding: 10px; font-size: 1rem; background: #000; border: 2px solid #fff; color: #fff; font-family: 'Courier New', Courier, monospace; margin-bottom: 15px; }
    .category-input:focus { outline: none; border: 2px solid #FFD700; }
    #stop-btn { background: #f44336; height: 80px; font-size: 1.5rem; margin-top: 30px; touch-action: manipulation; }
    #stop-btn:hover { background: #d32f2f; }
    #stop-btn:disabled { background: #999; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.9rem; }
    th, td { border: 1px solid #444; padding: 8px; text-align: left; }
    th { background: #222; }
    .valid { color: #4CAF50; }
    .invalid { color: #f44336; }
    .share-link { background: #222; padding: 10px; margin: 20px 0; border: 1px solid #444; word-break: break-all; font-size: 0.9rem; }
    .hidden { display: none; }
    .error { color: #f44336; margin-bottom: 10px; }
    .info { color: #FFD700; margin-bottom: 10px; }
    .round-info { text-align: center; font-size: 1.1rem; color: #aaa; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="lobby">
      <h1>World Words+</h1>
      <input type="text" id="player-name" placeholder="Your Name" />
      <input type="text" id="room-code-input" placeholder="Room Code (leave empty to create)" />
      <button id="go-btn">GO</button>
      <div id="lobby-error" class="error"></div>
    </div>

    <div id="waiting">
      <h1>World Words+</h1>
      <div id="room-code-display"></div>
      <div class="share-link"><strong>Share this link:</strong><br><span id="share-url"></span></div>
      <h2>Players:</h2>
      <ul id="players-list"></ul>
      <button id="start-btn" class="hidden">Start Game</button>
      <div id="waiting-info" class="info"></div>
    </div>

    <div id="game">
      <h1>World Words+</h1>
      <div class="round-info" id="round-info"></div>
      <div id="letter"></div>
      <div id="timer"></div>
      <div id="game-categories"></div>
      <button id="stop-btn">STOP!</button>
      <div id="game-info" class="info"></div>
    </div>

    <div id="results">
      <h1>Results</h1>
      <div id="results-letter" style="text-align:center; font-size:2rem; color:#FFD700; margin-bottom:10px;"></div>
      <div id="results-table"></div>
      <div id="scoreboard"></div>
      <button id="next-round-btn" class="hidden">Next Round</button>
      <div id="results-info" class="info"></div>
    </div>
  </div>

  <script>
    const socket = io();
    let myId = null, isHost = false, roomCode = null, timerInterval = null, timeLeft = 60;
    const CATEGORIES = [
      { id: 'country', name: 'Country', nameHe: '\u05D0\u05E8\u05E5' },
      { id: 'city', name: 'City', nameHe: '\u05E2\u05D9\u05E8' },
      { id: 'animal', name: 'Animal', nameHe: '\u05D7\u05D9' },
      { id: 'plant', name: 'Plant', nameHe: '\u05E6\u05D5\u05DE\u05D7' },
      { id: 'object', name: 'Object', nameHe: '\u05D3\u05D5\u05DE\u05DD' }
    ];
    let currentLetter = '';
    let currentLang = 'he';
    let playerMap = {};

    socket.on('connect', () => { myId = socket.id; });

    window.addEventListener('load', () => {
      const roomFromUrl = new URLSearchParams(window.location.search).get('room');
      if (roomFromUrl) document.getElementById('room-code-input').value = roomFromUrl;
    });

    document.getElementById('go-btn').addEventListener('click', () => {
      const name = document.getElementById('player-name').value.trim();
      const code = document.getElementById('room-code-input').value.trim();
      const errorEl = document.getElementById('lobby-error');
      if (!name) { errorEl.textContent = 'Please enter your name'; return; }
      errorEl.textContent = '';
      socket.emit('join_room', { name, code: code || null, lang: 'he' });
    });
    socket.on('game_update', (room) => {
      roomCode = room.code;
      isHost = room.hostId === myId;
      currentLang = room.lang || 'he';

      room.players.forEach(p => { playerMap[p.id] = p.name; });

      if (room.state === 'waiting') {
        showScreen('waiting');
        document.getElementById('room-code-display').textContent = roomCode;
        document.getElementById('share-url').textContent = window.location.origin + '?room=' + roomCode;
        document.getElementById('start-btn').classList.toggle('hidden', !isHost);
        document.getElementById('waiting-info').textContent = isHost ? '(You are the host)' : '(Waiting for host to start)';
        updatePlayersList(room.players);
      } else if (room.state === 'playing') {
        showScreen('game');
        currentLetter = room.currentLetter;
        document.getElementById('letter').textContent = currentLetter;
        document.getElementById('round-info').textContent = 'Round ' + room.currentRound + ' / ' + room.maxRounds;
        renderGameInputs();
        startTimer(60);
        document.getElementById('stop-btn').disabled = false;
        document.getElementById('game-info').textContent = '';
      }
    });

    socket.on('stop_round', () => {
      clearInterval(timerInterval);
      document.getElementById('stop-btn').disabled = true;
      document.getElementById('game-info').textContent = 'Time! Submitting answers...';
      submitAnswers();
    });

    socket.on('results', (data) => {
      showScreen('results');
      document.getElementById('next-round-btn').classList.toggle('hidden', !isHost);
      document.getElementById('results-letter').textContent = 'Letter: ' + data.letter;
      renderResults(data);
      renderScoreboard(data.scores);
    });

    socket.on('game_over', (data) => {
      showScreen('results');
      const winnerName = data.winner ? data.winner.name : 'Unknown';
      document.getElementById('results-table').innerHTML =
        '<h2 style="text-align:center; color:#FFD700;">Game Over!</h2>' +
        '<h2 style="text-align:center;">Winner: ' + winnerName + '</h2>';
      renderScoreboard(data.scores);
      document.getElementById('next-round-btn').classList.add('hidden');
      document.getElementById('results-info').textContent = 'Refresh to play again';
    });

    socket.on('error', (data) => {
      const msg = typeof data === 'string' ? data : data.message;
      document.getElementById('lobby-error').textContent = msg;
    });

    document.getElementById('start-btn').addEventListener('click', () => { socket.emit('start_game'); });

    document.getElementById('stop-btn').addEventListener('click', () => {
      submitAnswers();
      socket.emit('stop_game');
      document.getElementById('stop-btn').disabled = true;
      document.getElementById('game-info').textContent = 'Stopping...';
      clearInterval(timerInterval);
    });

    document.getElementById('next-round-btn').addEventListener('click', () => { socket.emit('next_round'); });

    function submitAnswers() {
      const answers = {};
      CATEGORIES.forEach(cat => {
        const input = document.getElementById('cat-' + cat.id);
        answers[cat.id] = input ? input.value.trim() : '';
      });
      socket.emit('submit_answers', { answers });
    }

    function showScreen(name) {
      ['lobby', 'waiting', 'game', 'results'].forEach(s => {
        document.getElementById(s).style.display = s === name ? 'block' : 'none';
      });
    }

    function updatePlayersList(players) {
      const list = document.getElementById('players-list');
      list.innerHTML = '';
      players.forEach(p => {
        const li = document.createElement('li');
        li.textContent = p.name + (p.id === myId ? ' (you)' : '');
        list.appendChild(li);
      });
    }

    function renderGameInputs() {
      const container = document.getElementById('game-categories');
      container.innerHTML = '';
      CATEGORIES.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'category-group';
        const label = document.createElement('label');
        label.className = 'category-label';
        label.textContent = currentLang === 'he' ? cat.nameHe : cat.name;
        const input = document.createElement('input');
        input.type = 'text';
        input.id = 'cat-' + cat.id;
        input.className = 'category-input';
        input.placeholder = currentLetter + '...';
        div.appendChild(label);
        div.appendChild(input);
        container.appendChild(div);
      });
      if (container.querySelector('input')) container.querySelector('input').focus();
    }

    function startTimer(seconds) {
      timeLeft = seconds;
      const timerEl = document.getElementById('timer');
      const update = () => {
        timerEl.textContent = timeLeft + 's';
        timerEl.classList.toggle('danger', timeLeft < 10);
      };
      update();
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        update();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
        }
      }, 1000);
    }

    function renderResults(data) {
      const container = document.getElementById('results-table');
      let html = '<table><tr><th>Player</th>';
      CATEGORIES.forEach(cat => {
        html += '<th>' + (currentLang === 'he' ? cat.nameHe : cat.name) + '</th>';
      });
      html += '<th>Round</th></tr>';

      Object.entries(data.results).forEach(([playerId, catResults]) => {
        const name = playerMap[playerId] || playerId.substring(0, 6);
        html += '<tr><td>' + name + (playerId === myId ? ' (you)' : '') + '</td>';
        let roundScore = 0;
        CATEGORIES.forEach(cat => {
          const r = catResults[cat.id];
          if (r) {
            const cls = r.valid ? 'valid' : 'invalid';
            const icon = r.valid ? '&#10003;' : '&#10007;';
            html += '<td class="' + cls + '">' + icon + ' +' + r.score + '</td>';
            roundScore += r.score;
          } else {
            html += '<td class="invalid">&#10007; 0</td>';
          }
        });
        html += '<td>' + roundScore + '</td></tr>';
      });
      html += '</table>';
      container.innerHTML = html;
      document.getElementById('results-info').textContent = isHost ? 'Click "Next Round" to continue' : 'Waiting for host...';
    }

    function renderScoreboard(scores) {
      const sb = document.getElementById('scoreboard');
      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      let html = '<h2>Scoreboard</h2><table><tr><th>#</th><th>Player</th><th>Total</th></tr>';
      sorted.forEach(([pid, score], i) => {
        const name = playerMap[pid] || pid.substring(0, 6);
        html += '<tr><td>' + (i + 1) + '</td><td>' + name + '</td><td>' + score + '</td></tr>';
      });
      html += '</table>';
      sb.innerHTML = html;
    }
  </script>
</body>
</html>
