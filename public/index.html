<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Words+ - Premium Word Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0a0e27;
            --secondary-dark: #121212;
            --tertiary-dark: #1a1f3a;
            --gold: #FFD700;
            --gold-glow: #FFA500;
            --electric-blue: #00D4FF;
            --neon-green: #00FF41;
            --neon-red: #FF006E;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --felt-green: #0B4D2C;
            --felt-green-dark: #082820;
            --player-green: #00FF41;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
            overflow: hidden;
            height: 100%;
            position: fixed;
            width: 100%;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--tertiary-dark) 100%);
            color: #fff;
            overflow: hidden;
            height: 100%;
            min-height: 100vh;
            position: fixed;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        /* ============= PARTICLES BACKGROUND ============= */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, var(--electric-blue), transparent);
            border-radius: 50%;
            animation: float 15s infinite linear;
            opacity: 0.3;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* ============= MAIN CONTAINER ============= */
        #app {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .screen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .screen.active {
            display: flex;
        }

        /* ============= LOBBY SCREEN ============= */
        #lobbyScreen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 0%, rgba(255, 215, 0, 0.1), transparent 50%),
                        linear-gradient(135deg, var(--primary-dark) 0%, var(--tertiary-dark) 100%);
            gap: 40px;
            padding: 40px;
        }

        .lobby-container {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            animation: slideIn 0.6s var(--transition);
        }

        .lobby-title {
            text-align: center;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--electric-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--electric-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--electric-blue);
            color: #fff;
            border-radius: 8px;
            font-family: 'Rubik', sans-serif;
            font-size: 14px;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            border-color: var(--electric-blue);
        }

        .flag-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .flag-btn {
            padding: 10px;
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid var(--gold);
            border-radius: 8px;
            cursor: pointer;
            font-size: 24px;
            transition: var(--transition);
            text-align: center;
        }

        .flag-btn:hover,
        .flag-btn.active {
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-group input {
            width: auto;
            margin: 0;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .button-group button {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Rubik', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-glow) 100%);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--electric-blue) 0%, #0099cc 100%);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--neon-red) 0%, #ff0055 100%);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.4);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.6);
        }

        /* ============= GAME SCREEN ============= */
        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 100%;
            max-height: 900px;
        }

        /* ============= POKER TABLE ============= */
        .poker-table {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 440px;
            height: 440px;
            background: radial-gradient(circle at 40% 40%, #0F5D3D, var(--felt-green-dark));
            border: 12px solid var(--gold);
            border-radius: 50%;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8),
                        0 0 60px rgba(255, 215, 0, 0.3),
                        0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .table-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* LETTER DISPLAY */
        .letter-display {
            text-align: center;
            z-index: 5;
        }

        .letter-display.hidden {
            display: none;
        }

        .letter-display.spinning {
            animation: spinLetter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes spinLetter {
            0% {
                transform: rotateY(0deg) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: rotateY(180deg) scale(1.2);
            }
            100% {
                transform: rotateY(360deg) scale(1);
                opacity: 1;
            }
        }

        .letter-char {
            font-size: 120px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold),
                         0 0 40px rgba(255, 215, 0, 0.6),
                         0 0 60px rgba(255, 165, 0, 0.4);
            line-height: 1;
            letter-spacing: -5px;
            animation: letterPulse 1.5s ease-in-out infinite;
        }

        @keyframes letterPulse {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 20px var(--gold),
                             0 0 40px rgba(255, 215, 0, 0.6),
                             0 0 60px rgba(255, 165, 0, 0.4);
            }
            50% {
                transform: scale(1.05);
                text-shadow: 0 0 30px var(--gold),
                             0 0 60px rgba(255, 215, 0, 0.8),
                             0 0 80px rgba(255, 165, 0, 0.6);
            }
        }

        /* TIMER SVG */
        .timer-svg {
            position: absolute;
            width: 320px;
            height: 320px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            z-index: 3;
        }

        .timer-svg circle {
            transition: stroke-dashoffset 0.1s linear;
        }

        .timer-svg-bg {
            fill: none;
            stroke: rgba(255, 215, 0, 0.1);
            stroke-width: 4;
        }

        .timer-svg-progress {
            fill: none;
            stroke: url(#timerGradient);
            stroke-width: 4;
            stroke-linecap: round;
        }

        /* CATEGORIES RING */
        .categories-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .category {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 15px;
            background: var(--glass-bg);
            border: 2px solid var(--electric-blue);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            gap: 5px;
        }

        .category-label {
            font-size: 11px;
            color: var(--electric-blue);
            text-transform: uppercase;
            font-weight: 600;
            text-align: center;
        }

        /* ============= PLAYER SEATS ============= */
        .players-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 6;
        }

        .player-seat {
            position: absolute;
            width: 100px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .player-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--electric-blue), var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 3px solid var(--electric-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            transition: var(--transition);
        }

        .player-seat.leading .player-avatar {
            border-color: var(--player-green);
            box-shadow: 0 0 30px var(--player-green),
                        0 0 50px rgba(0, 255, 65, 0.3);
        }

        .player-name {
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            max-width: 90px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--electric-blue);
        }

        .player-flag {
            font-size: 20px;
        }

        .player-score {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .typing-indicator {
            width: 30px;
            height: 8px;
            display: flex;
            gap: 3px;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--neon-green);
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* ============= STOP BUTTON ============= */
        .stop-button {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 20;
            cursor: pointer;
        }

        .stop-button-inner {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-red) 0%, #ff0055 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.5),
                        0 0 60px rgba(255, 0, 110, 0.2);
            animation: stopPulse 1s ease-in-out infinite;
            border: 3px solid rgba(255, 0, 110, 0.6);
            transition: var(--transition);
        }

        @keyframes stopPulse {
            0%, 100% {
                box-shadow: 0 0 30px rgba(255, 0, 110, 0.5),
                            0 0 60px rgba(255, 0, 110, 0.2);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 0, 110, 0.8),
                            0 0 80px rgba(255, 0, 110, 0.4);
            }
        }

        .stop-button-inner:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 0, 110, 0.8),
                        0 0 100px rgba(255, 0, 110, 0.4);
        }

        /* ============= WAITING ROOM ============= */
        #waitingRoom {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .waiting-container {
            text-align: center;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        .waiting-title {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--electric-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .room-code {
            font-size: 48px;
            font-weight: 900;
            color: var(--electric-blue);
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .players-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .player-item {
            padding: 15px;
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid var(--gold);
            border-radius: 10px;
            animation: slideIn 0.5s var(--transition);
        }

        .player-item-flag {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .player-item-name {
            font-size: 12px;
            color: var(--gold);
            font-weight: 700;
        }

        /* ============= JUDGING SCREEN ============= */
        #judgingScreen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .judging-container {
            text-align: center;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            max-width: 600px;
        }

        .judging-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 30px;
            color: var(--electric-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .scanning-animation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .scan-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .scan-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--electric-blue), var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid var(--electric-blue);
            opacity: 0.5;
        }

        .scan-avatar.active {
            animation: scanPulse 0.6s ease-out;
            opacity: 1;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }

        @keyframes scanPulse {
            0% {
                transform: scale(0.8);
            }
            100% {
                transform: scale(1);
            }
        }

        .scan-name {
            font-size: 10px;
            color: var(--electric-blue);
        }

        .results-list {
            text-align: left;
            margin-top: 20px;
        }

        .result-item {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: resultSlide 0.5s ease-out;
        }

        @keyframes resultSlide {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .result-answer {
            flex: 1;
            text-align: left;
        }

        .result-answer-text {
            font-weight: 700;
            color: #fff;
        }

        .result-answer-category {
            font-size: 12px;
            color: var(--electric-blue);
        }

        .result-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
        }

        .result-status.valid {
            background: rgba(0, 255, 65, 0.2);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .result-status.invalid {
            background: rgba(255, 0, 110, 0.2);
            color: var(--neon-red);
            border: 1px solid var(--neon-red);
            box-shadow: 0 0 10px rgba(255, 0, 110, 0.3);
        }

        .result-points {
            font-size: 16px;
            font-weight: 900;
            text-align: right;
            min-width: 50px;
        }

        .result-points.common {
            color: #fff;
        }

        .result-points.medium {
            color: var(--electric-blue);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
        }

        .result-points.rare {
            color: #b19cd9;
            text-shadow: 0 0 10px rgba(177, 156, 217, 0.6);
        }

        .result-points.legendary {
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            animation: sparkle 0.6s ease-out;
        }

        @keyframes sparkle {
            0% {
                text-shadow: 0 0 10px rgba(255, 215, 0, 0.8),
                             0 0 20px rgba(255, 215, 0, 0.4);
            }
            50% {
                text-shadow: 0 0 20px rgba(255, 215, 0, 1),
                             0 0 40px rgba(255, 215, 0, 0.6);
            }
            100% {
                text-shadow: 0 0 10px rgba(255, 215, 0, 0.8),
                             0 0 20px rgba(255, 215, 0, 0.4);
            }
        }

        /* ============= SCOREBOARD SCREEN ============= */
        #scoreboardScreen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .scoreboard-container {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            max-width: 600px;
            width: 100%;
        }

        .scoreboard-title {
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--electric-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .round-info {
            text-align: center;
            font-size: 14px;
            color: var(--electric-blue);
            margin-bottom: 30px;
        }

        .standings {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .standing-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            animation: scoreReveal 0.6s ease-out;
        }

        @keyframes scoreReveal {
            0% {
                opacity: 0;
                transform: translateX(-30px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .standing-rank {
            font-size: 24px;
            font-weight: 900;
            min-width: 40px;
            text-align: center;
        }

        .standing-rank.first {
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .standing-rank.second {
            color: var(--electric-blue);
        }

        .standing-rank.third {
            color: #c0a080;
        }

        .standing-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .standing-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--electric-blue), var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 2px solid var(--electric-blue);
        }

        .standing-name {
            font-weight: 700;
            flex: 1;
        }

        .standing-score {
            font-size: 20px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            min-width: 80px;
            text-align: right;
        }

        /* ============= GAME OVER SCREEN ============= */
        #gameOverScreen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            background: radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.15), transparent 50%),
                        linear-gradient(135deg, var(--primary-dark) 0%, var(--tertiary-dark) 100%);
        }

        .game-over-container {
            text-align: center;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }

        .game-over-title {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            animation: titlePulse 1s ease-out;
        }

        @keyframes titlePulse {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .game-over-subtitle {
            font-size: 16px;
            color: var(--electric-blue);
            margin-bottom: 40px;
        }

        .winner-display {
            margin-bottom: 40px;
        }

        .winner-trophy {
            font-size: 80px;
            animation: trophyBounce 0.8s ease-out;
            margin-bottom: 10px;
        }

        @keyframes trophyBounce {
            0% {
                transform: translateY(-50px);
                opacity: 0;
            }
            50% {
                transform: translateY(10px);
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .winner-name {
            font-size: 32px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .winner-score {
            font-size: 20px;
            color: var(--electric-blue);
        }

        .final-standings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .final-standing-card {
            padding: 20px;
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid var(--gold);
            border-radius: 15px;
            animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardPop {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .final-card-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--electric-blue), var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 10px;
            border: 2px solid var(--gold);
        }

        .final-card-name {
            font-weight: 700;
            color: var(--gold);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .final-card-score {
            font-size: 18px;
            font-weight: 900;
            color: var(--electric-blue);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* ============= INPUT AREA ============= */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            z-index: 1000;
            padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            background: linear-gradient(0deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.8) 80%, transparent 100%);
            backdrop-filter: blur(10px);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            background: var(--glass-bg);
            border: 1px solid var(--electric-blue);
            backdrop-filter: blur(5px);
            color: #fff;
            border-radius: 25px;
            font-family: 'Rubik', sans-serif;
            font-size: 14px;
            transition: var(--transition);
        }

        .input-area input:focus {
            outline: none;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            border-color: var(--electric-blue);
        }

        .input-area input::placeholder {
            color: rgba(0, 212, 255, 0.5);
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-glow) 100%);
            border: none;
            color: #000;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        /* ============= RESPONSIVE ============= */
        @media (max-width: 768px) {
            .poker-table {
                width: 320px;
                height: 320px;
            }

            .letter-char {
                font-size: 80px;
            }

            .player-seat {
                width: 80px;
                height: 120px;
            }

            .player-avatar {
                width: 55px;
                height: 55px;
                font-size: 24px;
            }

            .player-name,
            .player-flag,
            .player-score {
                font-size: 11px;
            }

            .category {
                width: 70px;
                height: 70px;
                font-size: 24px;
            }

            .stop-button-inner {
                width: 80px;
                height: 80px;
                font-size: 20px;
            }

            .lobby-container {
                padding: 30px 25px;
            }

            .lobby-title {
                font-size: 32px;
            }
        }

        /* ============= ANIMATIONS ============= */
        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============= UTILITY ============= */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        /* RTL SUPPORT */
        [dir="rtl"] {
            direction: rtl;
            text-align: right;
        }

        [dir="rtl"] .form-group label {
            text-align: right;
        }

        [dir="rtl"] .input-group {
            flex-direction: row-reverse;
        }

        [dir="rtl"] .button-group {
            direction: ltr;
        }
    </style>
</head>
<body>
    <div class="particles" id="particlesContainer"></div>

    <div id="app">
        <!-- LOBBY SCREEN -->
        <div id="lobbyScreen" class="screen active">
            <div class="lobby-container">
                <div class="lobby-title">World Words+</div>

                <div class="form-group">
                    <label for="playerName">Player Name</label>
                    <input type="text" id="playerName" placeholder="Enter your name" maxlength="20">
                </div>

                <div class="form-group">
                    <label>Select Flag</label>
                    <div class="flag-selector">
                        <div class="flag-btn active" data-flag="🇺🇸">🇺🇸</div>
                        <div class="flag-btn" data-flag="🇬🇧">🇬🇧</div>
                        <div class="flag-btn" data-flag="🇮🇱">🇮🇱</div>
                        <div class="flag-btn" data-flag="🇫🇷">🇫🇷</div>
                        <div class="flag-btn" data-flag="🇩🇪">🇩🇪</div>
                        <div class="flag-btn" data-flag="🇪🇸">🇪🇸</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="languageSelect">Language</label>
                    <select id="languageSelect">
                        <option value="en">English</option>
                        <option value="he">Hebrew (עברית)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" id="fillBots">
                        <span>Fill with Bots</span>
                    </label>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="createRoomBtn">Create Room</button>
                    <button class="btn-secondary" id="joinRoomBtn">Join Room</button>
                </div>

                <div id="roomCodeInput" class="form-group hidden">
                    <label for="roomCode">Room Code</label>
                    <input type="text" id="roomCode" placeholder="Enter room code" maxlength="6">
                </div>
            </div>
        </div>

        <!-- WAITING ROOM SCREEN -->
        <div id="waitingRoom" class="screen">
            <div class="waiting-container">
                <div class="waiting-title">Waiting for Players</div>
                <div class="room-code" id="displayRoomCode">ABCDEF</div>
                <div class="players-list" id="playersList"></div>
                <button class="btn-primary" id="startGameBtn" style="display: none;">Start Game</button>
                <div style="font-size: 12px; color: var(--electric-blue); margin-top: 20px;" id="waitingMessage">
                    Waiting for players to join...
                </div>
            </div>
        </div>

        <!-- SPINNING SCREEN -->
        <div id="spinningScreen" class="screen">
            <div style="text-align: center;">
                <div style="font-size: 64px; margin-bottom: 20px;">🎲</div>
                <div style="font-size: 24px; color: var(--electric-blue); margin-bottom: 40px;">Spinning Letter...</div>
            </div>
        </div>

        <!-- PLAYING SCREEN -->
        <div id="playingScreen" class="screen">
            <div class="game-wrapper">
                <div class="game-container">
                    <div class="stop-button">
                        <div class="stop-button-inner" id="stopBtn">STOP!</div>
                    </div>

                    <div class="poker-table">
                        <svg class="timer-svg" id="timerSvg" viewBox="0 0 320 320">
                            <defs>
                                <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:var(--gold);stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:var(--electric-blue);stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <circle class="timer-svg-bg" cx="160" cy="160" r="150"></circle>
                            <circle class="timer-svg-progress" id="timerProgress" cx="160" cy="160" r="150" style="stroke-dasharray: 942.478; stroke-dashoffset: 0;"></circle>
                        </svg>

                        <div class="table-content">
                            <div class="letter-display" id="letterDisplay">
                                <div class="letter-char" id="letterChar">A</div>
                            </div>
                        </div>

                        <div class="categories-container" id="categoriesContainer"></div>
                    </div>

                    <div class="players-container" id="playersContainer"></div>

                    <div class="input-area hidden" id="inputArea">
                        <div class="input-group">
                            <input type="text" id="answerInput" placeholder="Your answer..." maxlength="50">
                            <button id="submitAnswerBtn">Submit</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- JUDGING SCREEN -->
        <div id="judgingScreen" class="screen">
            <div class="judging-container">
                <div class="judging-title">AI Judging</div>
                <div class="scanning-animation" id="scanningAnimation"></div>
                <div class="results-list" id="resultsList"></div>
            </div>
        </div>

        <!-- SCOREBOARD SCREEN -->
        <div id="scoreboardScreen" class="screen">
            <div class="scoreboard-container">
                <div class="scoreboard-title">Round Results</div>
                <div class="round-info" id="roundInfo">Round 1 of 3</div>
                <div class="standings" id="standings"></div>
                <button class="btn-primary" id="nextRoundBtn" style="margin-top: 30px; width: 100%;">Next Round</button>
            </div>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="gameOverScreen" class="screen">
            <div class="game-over-container">
                <div class="game-over-title">🎉 Game Over!</div>
                <div class="game-over-subtitle">Final Results</div>

                <div class="winner-display">
                    <div class="winner-trophy" id="winnerTrophy">🏆</div>
                    <div class="winner-name" id="winnerName">Player Name</div>
                    <div class="winner-score" id="winnerScore">1250 Points</div>
                </div>

                <div class="final-standings" id="finalStandings"></div>

                <button class="btn-primary" id="playAgainBtn" style="margin-top: 30px; width: 100%;">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        // ============= GAME STATE =============
        const gameState = {
            screen: 'lobby',
            room: null,
            player: null,
            players: [],
            letter: '',
            categories: [],
            currentRound: 1,
            maxRounds: 3,
            timerEnd: 0,
            answers: {},
            language: 'en',
            isHost: false
        };

        // ============= SOCKET IO INITIALIZATION =============
        const socket = io();

        // ============= UI ELEMENTS =============
        const playerNameInput = document.getElementById('playerName');
        const languageSelect = document.getElementById('languageSelect');
        const fillBotsCheckbox = document.getElementById('fillBots');
        const createRoomBtn = document.getElementById('createRoomBtn');
        const joinRoomBtn = document.getElementById('joinRoomBtn');
        const roomCodeInput = document.getElementById('roomCodeInput');
        const roomCodeField = document.getElementById('roomCode');
        const startGameBtn = document.getElementById('startGameBtn');
        const stopBtn = document.getElementById('stopBtn');
        const answerInput = document.getElementById('answerInput');
        const submitAnswerBtn = document.getElementById('submitAnswerBtn');
        const nextRoundBtn = document.getElementById('nextRoundBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');

        // ============= INITIALIZATION =============
        function initializeParticles() {
            const container = document.getElementById('particlesContainer');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (10 + Math.random() * 20) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }

        initializeParticles();

        // ============= FLAG SELECTOR =============
        document.querySelectorAll('.flag-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameState.player = { ...gameState.player, flag: btn.dataset.flag };
            });
        });

        gameState.player = { flag: '🇺🇸', name: '' };

        // ============= ROOM CREATION & JOINING =============
        createRoomBtn.addEventListener('click', () => {
            const name = playerNameInput.value.trim();
            if (!name) {
                alert('Please enter a name');
                return;
            }
            gameState.player.name = name;
            gameState.language = languageSelect.value;
            socket.emit('create_room', {
                name: name,
                flag: gameState.player.flag,
                lang: gameState.language,
                fillBots: fillBotsCheckbox.checked
            });
        });

        joinRoomBtn.addEventListener('click', () => {
            if (roomCodeInput.classList.contains('hidden')) {
                roomCodeInput.classList.remove('hidden');
            } else {
                const name = playerNameInput.value.trim();
                const code = roomCodeField.value.trim().toUpperCase();
                if (!name || !code) {
                    alert('Please enter name and room code');
                    return;
                }
                gameState.player.name = name;
                gameState.language = languageSelect.value;
                socket.emit('join_room', {
                    code: code,
                    name: name,
                    flag: gameState.player.flag
                });
            }
        });

        // ============= SOCKET IO EVENTS =============
        socket.on('room_created', (data) => {
            gameState.room = data.room;
            gameState.isHost = true;
            gameState.players = data.room.players || [];
            showWaitingRoom();
        });

        socket.on('joined_room', (data) => {
            gameState.room = data.room;
            gameState.players = data.room.players || [];
            showWaitingRoom();
        });

        socket.on('room_update', (data) => {
            gameState.room = data;
            gameState.players = data.players || [];
            updatePlayersList();
            if (gameState.players.length > 1 && gameState.isHost) {
                startGameBtn.style.display = 'block';
            }
        });

        socket.on('round_start', (data) => {
            gameState.currentRound = data.round;
            gameState.maxRounds = data.maxRounds;
            showSpinningScreen();
        });

        socket.on('letter_revealed', (data) => {
            gameState.letter = data.letter;
            gameState.timerEnd = new Date(data.timerEnd).getTime();
            gameState.categories = data.categories || generateCategories();
            showPlayingScreen();
            startTimer();
        });

        socket.on('judging_start', () => {
            showJudgingScreen();
        });

        socket.on('judging_results', (data) => {
            displayJudgingResults(data);
        });

        socket.on('game_over', (data) => {
            gameState.players = data.players || [];
            showGameOverScreen();
        });

        socket.on('error', (data) => {
            alert('Error: ' + data.message);
        });

        // ============= SCREEN MANAGEMENT =============
        function showScreen(screenName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenName).classList.add('active');
            gameState.screen = screenName;
        }

        function showWaitingRoom() {
            document.getElementById('displayRoomCode').textContent = gameState.room.code;
            updatePlayersList();
            showScreen('waitingRoom');
        }

        function showSpinningScreen() {
            showScreen('spinningScreen');
            setTimeout(() => {
                socket.emit('next_round');
            }, 2000);
        }

        function showPlayingScreen() {
            renderPokerTable();
            document.getElementById('inputArea').classList.remove('hidden');
            showScreen('playingScreen');
        }

        function showJudgingScreen() {
            showScreen('judgingScreen');
        }

        function showGameOverScreen() {
            renderGameOverScreen();
            showScreen('gameOverScreen');
        }

        // ============= POKER TABLE RENDERING =============
        function renderPokerTable() {
            const letterDisplay = document.getElementById('letterDisplay');
            const letterChar = document.getElementById('letterChar');
            letterChar.textContent = gameState.letter.toUpperCase();
            letterDisplay.classList.remove('hidden');

            renderCategories();
            renderPlayers();
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';

            const categories = gameState.categories;
            const angleSlice = (2 * Math.PI) / categories.length;

            categories.forEach((cat, idx) => {
                const angle = angleSlice * idx - Math.PI / 2;
                const radius = 180;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                const elem = document.createElement('div');
                elem.className = 'category';
                elem.style.left = `calc(50% + ${x - 45}px)`;
                elem.style.top = `calc(50% + ${y - 45}px)`;
                elem.innerHTML = `<div>${cat.icon}</div><div class="category-label">${cat.name}</div>`;
                container.appendChild(elem);
            });
        }

        function renderPlayers() {
            const container = document.getElementById('playersContainer');
            container.innerHTML = '';

            const playerCount = gameState.players.length;
            const angleSlice = (2 * Math.PI) / playerCount;

            gameState.players.forEach((player, idx) => {
                const angle = angleSlice * idx - Math.PI / 2;
                const radius = 250;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                const seat = document.createElement('div');
                seat.className = 'player-seat';
                if (gameState.players[0] === player) {
                    seat.classList.add('leading');
                }
                seat.style.left = `calc(50% + ${x - 50}px)`;
                seat.style.top = `calc(50% + ${y - 70}px)`;

                seat.innerHTML = `
                    <div class="player-avatar">${player.flag}</div>
                    <div class="player-name">${player.name}</div>
                    <div class="player-score">${player.score || 0}</div>
                `;
                container.appendChild(seat);
            });
        }

        // ============= TIMER FUNCTIONALITY =============
        function startTimer() {
            const circle = document.getElementById('timerProgress');
            const radius = circle.getAttribute('r');
            const circumference = 2 * Math.PI * radius;
            circle.style.strokeDasharray = circumference;

            function updateTimer() {
                const now = Date.now();
                const remaining = gameState.timerEnd - now;
                const progress = Math.max(0, remaining / 60000);
                const offset = circumference - (progress * circumference);
                circle.style.strokeDashoffset = offset;

                if (remaining > 0) {
                    requestAnimationFrame(updateTimer);
                }
            }
            updateTimer();
        }

        // ============= ANSWER SUBMISSION =============
        submitAnswerBtn.addEventListener('click', () => {
            const answer = answerInput.value.trim();
            if (answer) {
                socket.emit('submit_answers', { answers: gameState.answers });
                answerInput.value = '';
            }
        });

        stopBtn.addEventListener('click', () => {
            socket.emit('stop_round');
        });

        // ============= JUDGING RESULTS DISPLAY =============
        function displayJudgingResults(data) {
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            data.results.forEach((result) => {
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';

                let statusClass = result.valid ? 'valid' : 'invalid';
                let statusText = result.valid ? '✓ Valid' : '✗ Invalid';

                let pointsClass = 'common';
                if (result.rarity === 'medium') pointsClass = 'medium';
                else if (result.rarity === 'rare') pointsClass = 'rare';
                else if (result.rarity === 'legendary') pointsClass = 'legendary';

                resultItem.innerHTML = `
                    <div class="result-answer">
                        <div class="result-answer-text">${result.answer}</div>
                        <div class="result-answer-category">${result.category}</div>
                    </div>
                    <div class="result-status ${statusClass}">${statusText}</div>
                    <div class="result-points ${pointsClass}">${result.points}pts</div>
                `;
                resultsList.appendChild(resultItem);
            });
        }

        // ============= STANDINGS DISPLAY =============
        function updatePlayersList() {
            const playersList = document.getElementById('playersList');
            playersList.innerHTML = '';
            gameState.players.forEach(player => {
                const item = document.createElement('div');
                item.className = 'player-item';
                item.innerHTML = `
                    <div class="player-item-flag">${player.flag}</div>
                    <div class="player-item-name">${player.name}</div>
                `;
                playersList.appendChild(item);
            });
        }

        // ============= GAME OVER SCREEN =============
        function renderGameOverScreen() {
            const sorted = [...gameState.players].sort((a, b) => (b.score || 0) - (a.score || 0));

            document.getElementById('winnerName').textContent = sorted[0].name;
            document.getElementById('winnerScore').textContent = (sorted[0].score || 0) + ' Points';

            const finalStandings = document.getElementById('finalStandings');
            finalStandings.innerHTML = '';
            sorted.forEach((player, idx) => {
                const card = document.createElement('div');
                card.className = 'final-standing-card';
                card.style.animationDelay = (idx * 0.1) + 's';
                card.innerHTML = `
                    <div class="final-card-avatar">${player.flag}</div>
                    <div class="final-card-name">${player.name}</div>
                    <div class="final-card-score">${player.score || 0}</div>
                `;
                finalStandings.appendChild(card);
            });
        }

        // ============= NEXT ROUND =============
        nextRoundBtn.addEventListener('click', () => {
            socket.emit('next_round');
        });

        // ============= PLAY AGAIN =============
        playAgainBtn.addEventListener('click', () => {
            location.reload();
        });

        // ============= START GAME =============
        startGameBtn.addEventListener('click', () => {
            socket.emit('start_game');
        });

        // ============= HELPER FUNCTIONS =============
        function generateCategories() {
            if (gameState.language === 'he') {
                return [
                    { id: 'country', name: 'ארץ', icon: '🌍' },
                    { id: 'city', name: 'עיר', icon: '🏙️' },
                    { id: 'animal', name: 'חי', icon: '🦁' },
                    { id: 'plant', name: 'צומח', icon: '🌿' },
                    { id: 'object', name: 'דומם', icon: '🎯' },
                    { id: 'food', name: 'אוכל', icon: '🍕' }
                ];
            }
            return [
                { id: 'country', name: 'Country', icon: '🌍' },
                { id: 'city', name: 'City', icon: '🏙️' },
                { id: 'animal', name: 'Animal', icon: '🦁' },
                { id: 'plant', name: 'Plant', icon: '🌿' },
                { id: 'object', name: 'Object', icon: '🎯' },
                { id: 'food', name: 'Food', icon: '🍕' }
            ];
        }

        gameState.categories = generateCategories();

        // ============= MOBILE KEYBOARD JUMP FIX =============
        // Prevent viewport from scrolling when virtual keyboard opens
        if (answerInput) {
            answerInput.addEventListener('focus', (e) => {
                // Prevent browser from auto-scrolling to the input
                setTimeout(() => {
                    window.scrollTo(0, 0);
                    document.body.scrollTop = 0;
                    document.documentElement.scrollTop = 0;
                }, 50);
                setTimeout(() => {
                    window.scrollTo(0, 0);
                    document.body.scrollTop = 0;
                    document.documentElement.scrollTop = 0;
                }, 150);
                setTimeout(() => {
                    window.scrollTo(0, 0);
                    document.body.scrollTop = 0;
                    document.documentElement.scrollTop = 0;
                }, 300);
            });
        }

        // Use visualViewport API to handle keyboard appearance
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                // Keep the page from jumping when keyboard opens/closes
                document.body.style.height = window.visualViewport.height + 'px';
                window.scrollTo(0, 0);
            });
            window.visualViewport.addEventListener('scroll', () => {
                window.scrollTo(0, 0);
            });
        }

        // Prevent any scroll events during gameplay
        document.addEventListener('scroll', (e) => {
            window.scrollTo(0, 0);
        }, { passive: false });
    </script>
</body>
</html>
